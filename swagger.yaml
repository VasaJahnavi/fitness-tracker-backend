openapi: 3.0.0
info:
  title: Fitness & Workout Tracking API
  description: |
    A comprehensive backend API for fitness tracking and workout management.
    This API provides endpoints for user management, workout tracking, 
    exercise management, goal setting, and fitness analytics.
  version: 2.0.0
  contact:
    name: API Support
    email: support@fitnessapp.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000/api
    description: Development Server
  - url: https://your-production-url.com/api
    description: Production Server

tags:
  - name: Authentication
    description: User authentication endpoints
  - name: Users
    description: User profile and settings management
  - name: Exercises
    description: Exercise library management
  - name: Workouts
    description: Workout plan management
  - name: Goals
    description: Fitness goal management
  - name: Activities
    description: Workout activity tracking
  - name: Analytics
    description: Progress analytics and reports
  - name: Recommendations
    description: Personalized workout recommendations
  - name: Dashboard
    description: User dashboard endpoints
  - name: Health
    description: System health and status

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    # ============ USER SCHEMAS ============
    User:
      type: object
      properties:
        id:
          type: string
          example: "60d5f9f9b8e9a7a6c4e8f9d2"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "john@example.com"
        age:
          type: number
          example: 28
        gender:
          type: string
          enum: [male, female, other, prefer-not-to-say]
        height:
          type: number
          example: 175
        weight:
          type: number
          example: 75
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        fitnessGoals:
          type: array
          items:
            type: string
            enum: [lose-weight, gain-muscle, improve-cardio, increase-strength, flexibility]
        preferences:
          type: object
          properties:
            preferredWorkoutDays:
              type: array
              items:
                type: number
            preferredWorkoutTime:
              type: string
              enum: [morning, afternoon, evening, night]
            preferredWorkoutTypes:
              type: array
              items:
                type: string
                enum: [strength-training, cardio, yoga, hiit, flexibility]
        settings:
          type: object
          properties:
            language:
              type: string
              enum: [en, es, fr, de, zh, ja]
            timezone:
              type: string
            units:
              type: object
              properties:
                weight:
                  type: string
                  enum: [kg, lbs]
                height:
                  type: string
                  enum: [cm, ft]
                distance:
                  type: string
                  enum: [km, mi]
        totalWorkouts:
          type: number
          example: 45
        totalCaloriesBurned:
          type: number
          example: 15000
        streakCount:
          type: number
          example: 7
        profileCompletion:
          type: number
          example: 85
        createdAt:
          type: string
          format: date-time

    # ============ AUTH SCHEMAS ============
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Login successful"
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        timestamp:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "john@example.com"
        password:
          type: string
          example: "password123"
          minLength: 6
        age:
          type: number
          example: 28
        gender:
          type: string
          enum: [male, female, other]
        height:
          type: number
          example: 175
        weight:
          type: number
          example: 75
        fitnessLevel:
          type: string
          enum: [beginner, intermediate, advanced]

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "john@example.com"
        password:
          type: string
          example: "password123"

    # ============ EXERCISE SCHEMAS ============
    Exercise:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: "Bench Press"
        category:
          type: string
          enum: [strength-training, cardio, yoga, hiit, flexibility]
        muscleGroup:
          type: array
          items:
            type: string
            enum: [chest, back, shoulders, biceps, triceps, legs, glutes, core, cardio, full-body]
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        caloriesPerMinute:
          type: number
          example: 5.5
        description:
          type: string
        instructions:
          type: array
          items:
            type: string
        equipmentNeeded:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateExerciseRequest:
      type: object
      required:
        - name
        - category
        - muscleGroup
        - caloriesPerMinute
      properties:
        name:
          type: string
        category:
          type: string
          enum: [strength-training, cardio, yoga, hiit, flexibility]
        muscleGroup:
          type: array
          items:
            type: string
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        caloriesPerMinute:
          type: number
        description:
          type: string
        instructions:
          type: array
          items:
            type: string
        equipmentNeeded:
          type: array
          items:
            type: string

    # ============ WORKOUT SCHEMAS ============
    WorkoutPlan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: "Full Body Strength"
        description:
          type: string
        category:
          type: string
          enum: [strength-training, cardio, yoga, hiit, flexibility]
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        duration:
          type: number
          example: 45
        exercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: string
              sets:
                type: number
              reps:
                type: number
              duration:
                type: number
              restTime:
                type: number
              order:
                type: number
        totalCalories:
          type: number
        isPublic:
          type: boolean
        tags:
          type: array
          items:
            type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateWorkoutRequest:
      type: object
      required:
        - name
        - category
        - duration
        - exercises
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [strength-training, cardio, yoga, hiit, flexibility]
        difficultyLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        duration:
          type: number
        exercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: string
              sets:
                type: number
              reps:
                type: number
              duration:
                type: number
              restTime:
                type: number
              order:
                type: number
        tags:
          type: array
          items:
            type: string
        isPublic:
          type: boolean

    # ============ GOAL SCHEMAS ============
    Goal:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        type:
          type: string
          enum: [weight-loss, weight-gain, daily-exercise, weekly-workout, strength, cardio]
        targetValue:
          type: number
        currentValue:
          type: number
        targetUnit:
          type: string
          enum: [kg, lbs, minutes, hours, sessions, reps]
        startDate:
          type: string
          format: date-time
        targetDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, completed, failed, paused]
        progress:
          type: number
          min: 0
          max: 100
        notes:
          type: string
        completionDate:
          type: string
          format: date-time

    CreateGoalRequest:
      type: object
      required:
        - type
        - targetValue
        - targetUnit
        - targetDate
      properties:
        type:
          type: string
          enum: [weight-loss, weight-gain, daily-exercise, weekly-workout, strength, cardio]
        targetValue:
          type: number
        targetUnit:
          type: string
          enum: [kg, lbs, minutes, hours, sessions, reps]
        targetDate:
          type: string
          format: date-time
        notes:
          type: string

    # ============ ACTIVITY SCHEMAS ============
    WorkoutLog:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        workoutPlanId:
          type: string
        date:
          type: string
          format: date-time
        duration:
          type: number
        exercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: string
              sets:
                type: number
              reps:
                type: number
              weight:
                type: number
              duration:
                type: number
              caloriesBurned:
                type: number
              notes:
                type: string
        totalCaloriesBurned:
          type: number
        perceivedExertion:
          type: number
          min: 1
          max: 10
        notes:
          type: string
        mood:
          type: string
          enum: [great, good, okay, tired, exhausted]
        createdAt:
          type: string
          format: date-time

    LogWorkoutRequest:
      type: object
      required:
        - duration
        - exercises
      properties:
        workoutPlanId:
          type: string
        date:
          type: string
          format: date-time
        duration:
          type: number
        exercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: string
              sets:
                type: number
              reps:
                type: number
              weight:
                type: number
              duration:
                type: number
              caloriesBurned:
                type: number
              notes:
                type: string
        perceivedExertion:
          type: number
          min: 1
          max: 10
        notes:
          type: string
        mood:
          type: string
          enum: [great, good, okay, tired, exhausted]

    # ============ ANALYTICS SCHEMAS ============
    AnalyticsSummary:
      type: object
      properties:
        period:
          type: string
        dateRange:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        workouts:
          type: object
          properties:
            totalWorkouts:
              type: number
            totalDuration:
              type: number
            avgDuration:
              type: number
            totalCalories:
              type: number
            avgCalories:
              type: number
        goals:
          type: object
          properties:
            total:
              type: number
            completed:
              type: number
            completionRate:
              type: number
        progress:
          type: object
        calories:
          type: object
        fitnessScore:
          type: number
        streak:
          type: object

    # ============ RECOMMENDATION SCHEMAS ============
    Recommendation:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        type:
          type: string
          enum: [workout-plan, exercise, daily-activity]
        recommendation:
          type: object
        reason:
          type: string
        confidenceScore:
          type: number
        isViewed:
          type: boolean
        isAccepted:
          type: boolean
        isCompleted:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # ============ DASHBOARD SCHEMAS ============
    Dashboard:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        today:
          type: object
          properties:
            workout:
              $ref: '#/components/schemas/WorkoutLog'
            recommendation:
              type: object
        weekly:
          type: object
          properties:
            totalWorkouts:
              type: number
            totalCalories:
              type: number
            totalDuration:
              type: number
            daysActive:
              type: number
        goals:
          type: object
          properties:
            active:
              type: array
              items:
                $ref: '#/components/schemas/Goal'
            stats:
              type: object
        recentWorkouts:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutLog'
        progress:
          type: object
        streak:
          type: object
          properties:
            current:
              type: number
            longest:
              type: number
        suggestedWorkouts:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutPlan'

    # ============ ERROR SCHEMA ============
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        timestamp:
          type: string
          format: date-time

paths:
  # ============ AUTH ENDPOINTS ============
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        401:
          description: Invalid credentials

  /auth/me:
    get:
      summary: Get current user profile
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  /auth/logout:
    post:
      summary: Logout user
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logged out successfully

  # ============ USER ENDPOINTS ============
  /users/profile:
    put:
      summary: Update user profile
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        200:
          description: Profile updated

  /users/metrics:
    put:
      summary: Update health metrics
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                height:
                  type: number
                weight:
                  type: number
                age:
                  type: number
      responses:
        200:
          description: Metrics updated

  /users/preferences:
    put:
      summary: Update fitness preferences
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                preferredWorkoutDays:
                  type: array
                  items:
                    type: number
                preferredWorkoutTime:
                  type: string
                  enum: [morning, afternoon, evening, night]
                preferredWorkoutTypes:
                  type: array
                  items:
                    type: string
      responses:
        200:
          description: Preferences updated

  /users/stats:
    get:
      summary: Get user statistics
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, quarter, year]
            description: Time period for stats
      responses:
        200:
          description: Statistics retrieved

  /users/settings:
    get:
      summary: Get user settings
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Settings retrieved
    
    put:
      summary: Update user settings
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                  enum: [en, es, fr, de, zh, ja]
                timezone:
                  type: string
                units:
                  type: object
                  properties:
                    weight:
                      type: string
                      enum: [kg, lbs]
                    height:
                      type: string
                      enum: [cm, ft]
                    distance:
                      type: string
                      enum: [km, mi]
      responses:
        200:
          description: Settings updated

  /users/email:
    put:
      summary: Update user email
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newEmail
                - password
              properties:
                newEmail:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Email updated

  /users/notifications:
    get:
      summary: Get notification preferences
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Notification preferences retrieved
    
    put:
      summary: Update notification preferences
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    frequency:
                      type: string
                      enum: [instant, daily, weekly]
                    types:
                      type: array
                      items:
                        type: string
                push:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    types:
                      type: array
                      items:
                        type: string
      responses:
        200:
          description: Notification preferences updated

  /users/account:
    delete:
      summary: Delete user account
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - confirm
              properties:
                password:
                  type: string
                confirm:
                  type: boolean
      responses:
        200:
          description: Account deleted

  # ============ EXERCISE ENDPOINTS ============
  /exercises:
    get:
      summary: Get all exercises
      tags: [Exercises]
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: muscleGroup
          in: query
          schema:
            type: string
        - name: difficultyLevel
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        200:
          description: Exercises retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      exercises:
                        type: array
                        items:
                          $ref: '#/components/schemas/Exercise'
                      pagination:
                        type: object
    
    post:
      summary: Create a new exercise
      tags: [Exercises]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseRequest'
      responses:
        201:
          description: Exercise created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Exercise'

  /exercises/{id}:
    get:
      summary: Get exercise by ID
      tags: [Exercises]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Exercise retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Exercise'
        404:
          description: Exercise not found

    put:
      summary: Update exercise
      tags: [Exercises]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExerciseRequest'
      responses:
        200:
          description: Exercise updated

    delete:
      summary: Delete exercise
      tags: [Exercises]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Exercise deleted

  /exercises/muscle/{muscleGroup}:
    get:
      summary: Get exercises by muscle group
      tags: [Exercises]
      security:
        - bearerAuth: []
      parameters:
        - name: muscleGroup
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Exercises retrieved

  # ============ WORKOUT ENDPOINTS ============
  /workouts:
    get:
      summary: Get all workout plans
      tags: [Workouts]
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: difficultyLevel
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        200:
          description: Workout plans retrieved
    
    post:
      summary: Create a workout plan
      tags: [Workouts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        201:
          description: Workout plan created

  /workouts/my-workouts:
    get:
      summary: Get user's workout plans
      tags: [Workouts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User's workout plans retrieved

  /workouts/public:
    get:
      summary: Get public workout plans
      tags: [Workouts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Public workout plans retrieved

  /workouts/category/{category}:
    get:
      summary: Get workouts by category
      tags: [Workouts]
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Workouts retrieved

  /workouts/{id}:
    get:
      summary: Get workout plan by ID
      tags: [Workouts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Workout plan retrieved
    
    put:
      summary: Update workout plan
      tags: [Workouts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutRequest'
      responses:
        200:
          description: Workout plan updated
    
    delete:
      summary: Delete workout plan
      tags: [Workouts]
      security:
        - bearerAuth: []
